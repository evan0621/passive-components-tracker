<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>被動元件價格追蹤</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
  background: #f1f5f9; color: #1e293b; font-size: 13px; min-height: 100vh; }
.header { background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 12px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.header-left { flex: 1; min-width: 0; }
.header-title { font-size: 15px; font-weight: 600; color: #0f172a; }
.header-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.ref-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.ref-link { font-size: 10px; color: #3b82f6; background: #eff6ff; border: 1px solid #bfdbfe;
  padding: 2px 7px; border-radius: 4px; text-decoration: none; white-space: nowrap; }
.ref-link:hover { background: #dbeafe; }
.header-btns { display: flex; gap: 8px; flex-shrink: 0; }
.btn { background: #3b82f6; color: #fff; border: none; padding: 6px 14px; border-radius: 6px;
  cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; transition: background 0.15s; }
.btn:hover { background: #2563eb; }
.btn-ghost { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
.btn-ghost:hover { background: #e2e8f0; }
.status-bar { font-size: 11px; color: #64748b; background: #f8fafc;
  padding: 5px 16px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
/* Tab row: each category on its own line */
.spec-tabs { display: block; background: #fff; border-bottom: 2px solid #e2e8f0;
  padding: 4px 12px 0; }
.tab-group { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; padding-bottom: 2px; }
.tab-cat { font-size: 11px; color: #1e40af; padding: 2px 8px 2px 6px;
  font-weight: 500; letter-spacing: 0.3px; white-space: nowrap; flex-shrink: 0;
  border-left: 3px solid #93c5fd; margin-right: 2px; }
.tab-sep { display: none; }
.spec-tab { padding: 7px 10px; font-size: 12px; font-weight: 500; color: #64748b;
  cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.15s; user-select: none; border-radius: 4px 4px 0 0; white-space: nowrap;
  flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
.spec-tab:hover { color: #334155; background: #f8fafc; }
.spec-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #eff6ff; font-weight: 600; }
.use-tag { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.2px; flex-shrink: 0; }
.use-ai       { background: #ede9fe; color: #6d28d9; }
.use-consumer { background: #fff7ed; color: #c2410c; }
.use-auto     { background: #fce7f3; color: #9d174d; }
.use-mobile   { background: #d1fae5; color: #065f46; }
.use-ind      { background: #e0f2fe; color: #0369a1; }
.main { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
.card-header { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #475569;
  text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #f1f5f9;
  background: #f8fafc; display: flex; align-items: center; justify-content: space-between; }
.chart-wrap { padding: 10px 14px 14px; }
.chart-container { position: relative; height: 300px; }
table { width: 100%; border-collapse: collapse; }
th { background: #f8fafc; padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600;
  color: #64748b; text-transform: uppercase; letter-spacing: 0.4px;
  border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; color: #334155; font-size: 12px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }
.price-main { font-weight: 600; color: #0f172a; }
.price-bulk { color: #64748b; font-size: 11px; }
.stock-badge { display: inline-block; padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 500; }
.stock-hi  { background: #dcfce7; color: #15803d; }
.stock-mid { background: #fef9c3; color: #854d0e; }
.stock-lo  { background: #fee2e2; color: #b91c1c; }
.stock-zero{ background: #f1f5f9; color: #94a3b8; }
.brand-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; background: #eff6ff; color: #3b82f6; font-weight: 500; }
.empty-state { text-align: center; padding: 40px; color: #94a3b8; line-height: 1.8; }
.no-trend { padding: 24px; text-align: center; color: #94a3b8; font-size: 12px; line-height: 1.7; }
.avg-strip { display: flex; gap: 16px; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #f1f5f9; flex-wrap: wrap; }
.avg-item { display: flex; flex-direction: column; gap: 2px; }
.avg-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.4px; }
.avg-value { font-size: 16px; font-weight: 700; color: #0f172a; }
.avg-sub { font-size: 10px; color: #64748b; }
.delta-up   { color: #ef4444; font-weight: 700; }
.delta-down { color: #22c55e; font-weight: 700; }
.delta-flat { color: #94a3b8; font-weight: 700; }
.use-info { font-size: 11px; color: #64748b; padding: 6px 14px 8px; background: #f8fafc;
  border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px; }
.filter-row { display: flex; gap: 8px; align-items: center; }
.filter-row label { font-size: 11px; color: #94a3b8; }
.filter-row select { font-size: 11px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 2px 6px; color: #334155; background: #fff; }
.modal-bg { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
.modal-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 380px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
.modal-title { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
.modal-body { font-size: 12px; color: #475569; line-height: 1.8; margin-bottom: 16px; }
.modal-note { font-size: 11px; color: #94a3b8; margin-bottom: 16px; }
.modal-btn { width: 100%; background: #3b82f6; color: #fff; border: none; padding: 9px;
  border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }

/* ── Mobile ─────────────────────────────────────────── */
@media (max-width: 768px) {
  .header { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .header-btns { width: 100%; }
  .header-btns .btn { font-size: 12px; padding: 5px 10px; }
  .spec-tabs { padding: 4px 8px 0; }
  .tab-group { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
  .tab-group::-webkit-scrollbar { height: 2px; }
  .tab-group::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  .tab-cat { font-size: 9px; padding: 2px 5px; position: sticky; left: 0; background: #fff; z-index: 1; }
  .spec-tab { font-size: 11px; padding: 6px 8px; white-space: nowrap; }
  .main { padding: 8px 10px; gap: 8px; }
  .avg-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 12px; }
  .avg-value { font-size: 14px !important; }
  .avg-label { font-size: 9px; }
  .avg-sub { font-size: 9px; }
  .card-header { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
  .filter-row { flex-wrap: wrap; gap: 4px; }
  .filter-row select { font-size: 11px; max-width: 90px; }
  .chart-wrap { padding: 8px 10px 12px; }
  .chart-container { height: 220px !important; }
  #table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  #table-wrap table { min-width: 560px; }
  th, td { padding: 6px 8px; font-size: 11px; }
  .use-info { font-size: 10px; padding: 5px 10px; }
  .status-bar { font-size: 10px; padding: 4px 12px; }
}
.modal-btn:hover { background: #2563eb; }
.tag { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: monospace; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">被動元件價格追蹤</div>
    <div class="header-sub">LCSC + Mouser · 自動每日更新</div>
    <div class="ref-links">
      <span style="font-size:10px;color:#94a3b8;">資料來源：</span>
      <a class="ref-link" id="lcsc-link" href="#" target="_blank">LCSC</a>
      <a class="ref-link" id="mouser-link" href="#" target="_blank">Mouser TW</a>
    </div>
  </div>
  <div class="header-btns"></div>
</div>

<div class="status-bar">
  <div class="dot"></div>
  <span id="status-text">就緒</span>
</div>

<div class="spec-tabs" id="spec-tabs"></div>

<div class="main">
  <div class="card">
    <div id="use-info-bar" class="use-info"></div>
    <div class="avg-strip">
      <div class="avg-item">
        <div class="avg-label">現貨平均最低單價</div>
        <div class="avg-value" id="avg-price-val">—</div>
        <div class="avg-sub" id="avg-price-sub">尚無資料</div>
      </div>
      <div class="avg-item">
        <div class="avg-label">現貨中位數單價</div>
        <div class="avg-value" id="median-price-val">—</div>
        <div class="avg-sub" id="median-price-sub">中位數 · USD</div>
      </div>
      <div class="avg-item">
        <div class="avg-label">單日漲跌幅</div>
        <div style="display:flex;gap:14px;align-items:flex-end;margin-top:2px">
          <div>
            <div style="font-size:9px;color:#94a3b8;margin-bottom:1px">均值</div>
            <div class="avg-value" id="price-delta" style="font-size:15px">—</div>
          </div>
          <div>
            <div style="font-size:9px;color:#94a3b8;margin-bottom:1px">中位數</div>
            <div class="avg-value" id="median-delta" style="font-size:15px">—</div>
          </div>
        </div>
        <div class="avg-sub" id="price-delta-sub">較前日</div>
      </div>
      <div class="avg-item">
        <div class="avg-label">現貨 / 總型號數</div>
        <div class="avg-value" id="instock-count" style="font-size:14px">—</div>
        <div class="avg-sub">有庫存 / 全部型號</div>
      </div>
      <div class="avg-item">
        <div class="avg-label">現貨庫存加總</div>
        <div class="avg-value" id="total-stock" style="font-size:14px">—</div>
        <div class="avg-sub" id="stock-delta-sub">PCS</div>
      </div>
      <div class="avg-item">
        <div class="avg-label">最低價型號</div>
        <div class="avg-value" id="cheapest-model" style="font-size:12px">—</div>
        <div class="avg-sub" id="cheapest-sub">—</div>
      </div>
    </div>
    <div class="card-header">
      <span>最低單價趨勢</span>
      <span style="font-size:11px;font-weight:400;color:#64748b">現貨品項平均</span>
    </div>
    <div class="chart-wrap">
      <div id="trend-placeholder" class="no-trend">累積 2 天以上資料後即可查看趨勢</div>
      <div class="chart-container" id="trend-container" style="display:none">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>
    <div class="card-header" style="border-top:1px solid #f1f5f9">
      <span>庫存趨勢</span>
      <span style="font-size:11px;font-weight:400;color:#64748b">現貨數量 / 型號數</span>
    </div>
    <div class="chart-wrap">
      <div id="stock-placeholder" class="no-trend">累積 2 天以上資料後即可查看庫存趨勢</div>
      <div class="chart-container" id="stock-container" style="display:none">
        <canvas id="stock-chart"></canvas>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span>零件明細</span>
      <div class="filter-row">
        <label>封裝</label>
        <select id="pkg-filter"><option value="">全部</option></select>
        <label>庫存</label>
        <select id="stock-filter">
          <option value="">全部</option>
          <option value="instock">現貨</option>
        </select>
        <label>品牌</label>
        <select id="brand-filter"><option value="">全部</option></select>
        <label>來源</label>
        <select id="src-filter">
          <option value="">全部</option>
          <option value="LCSC">LCSC</option>
          <option value="Mouser">Mouser</option>
        </select>
      </div>
    </div>
    <div id="table-wrap"><div class="empty-state">尚無資料</div></div>
  </div>
</div>

const specDef      = () => SPECS.find(s => s.key === currentSpec) || SPECS[0];
const specData     = () => HISTORY_DATA[currentSpec] || {};
const latestDate   = () => { const d = Object.keys(specData()).sort(); return d.length ? d[d.length-1] : null; };
const latestProducts = () => { const d = latestDate(); return d ? (specData()[d].products || []) : []; };
const calcAvg = (products) => {
  const s = products.filter(p => p.stock > 0 && p.min_price > 0);
  return s.length ? s.reduce((a,p) => a + p.min_price, 0) / s.length : null;
};
const calcMedianUsd = (products) => {
  const ps = products.filter(p => p.stock > 0).map(p => getPriceUsd(p)).filter(v => v > 0);
  if (!ps.length) return null;
  ps.sort((a,b) => a-b);
  const mid = Math.floor(ps.length / 2);
  return ps.length % 2 === 0 ? (ps[mid-1] + ps[mid]) / 2 : ps[mid];
};
const getMedianUsd = (entry) => {
  // Use precomputed value for historical entries (products stripped to keep HTML small)
  if ((entry.products || []).length === 0 && entry.median_price_usd != null) {
    return entry.median_price_usd;
  }
  const ps = (entry.products || []).filter(p => p.stock > 0).map(p => getPriceUsd(p)).filter(v => v > 0);
  if (!ps.length) return null;
  ps.sort((a,b) => a-b);
  const mid = Math.floor(ps.length / 2);
  return ps.length % 2 === 0 ? (ps[mid-1] + ps[mid]) / 2 : ps[mid];
};

// avg_price_usd from entry, fallback: convert CNY avg_price with ~0.138
const getAvgUsd = (entry) => {
  if (entry.avg_price_usd != null) return entry.avg_price_usd;
  if (entry.avg_price != null) return entry.avg_price * (entry.exchange_rate || 0.138);
  return null;
};
// min_price_usd from product, fallback: convert CNY min_price
const getPriceUsd = (p) => {
  if (p.min_price_usd != null) return p.min_price_usd;
  return p.min_price * 0.138;
};
// price tier in USD
const getTierUsd = (p, qty) => {
  if (p.prices_usd && p.prices_usd[qty]) return p.prices_usd[qty];
  if (p.prices && p.prices[qty]) {
    const rate = p.currency === 'USD' ? 1 : (p.exchange_rate || 0.138);
    return p.prices[qty] * rate;
  }
  return null;
};

function renderSummary() {
  const products = latestProducts();
  const inStock = products.filter(p => p.stock > 0);
  const today = latestDate();
  const data = specData();
  const dates = Object.keys(data).sort();
  const todayEntry = today ? (data[today] || {}) : {};
  const avgUsd = getAvgUsd(todayEntry);

  // previous day
  const prevDate = dates.length >= 2 ? dates[dates.indexOf(today) - 1] : null;
  const prevEntry = prevDate ? data[prevDate] : null;
  const prevAvgUsd = prevEntry ? getAvgUsd(prevEntry) : null;
  const prevProducts = prevEntry ? (prevEntry.products || []) : [];
  const prevStock = prevProducts.filter(p => p.stock > 0).reduce((s, p) => s + (p.stock || 0), 0);
  const totalStock = inStock.reduce((s, p) => s + (p.stock || 0), 0);

  // delta helpers
  const deltaHtml = (now, prev, invert) => {
    if (now == null || prev == null || prev === 0) return '<span class="delta-flat">—</span>';
    const pct = (now - prev) / Math.abs(prev) * 100;
    const cls = pct === 0 ? 'delta-flat' : (pct > 0) === !invert ? 'delta-up' : 'delta-down';
    const sign = pct > 0 ? '+' : '';
    return `<span class="${cls}">${sign}${pct.toFixed(2)}%</span>`;
  };

  // price + median
  const medianUsd = getMedianUsd(todayEntry);
  document.getElementById('avg-price-val').textContent = avgUsd != null ? '$' + avgUsd.toFixed(4) : '—';
  document.getElementById('avg-price-sub').textContent = avgUsd != null ? today + ' · USD' : '尚無資料';
  const prevMedianUsd = prevEntry ? getMedianUsd(prevEntry) : null;
  document.getElementById('median-price-val').textContent = medianUsd != null ? '$' + medianUsd.toFixed(4) : '—';
  document.getElementById('median-price-sub').textContent = '中位數 · USD';

  // price delta + median delta
  document.getElementById('price-delta').innerHTML = deltaHtml(avgUsd, prevAvgUsd, false);
  document.getElementById('median-delta').innerHTML = deltaHtml(medianUsd, prevMedianUsd, false);
  document.getElementById('price-delta-sub').textContent = prevDate ? '較 ' + prevDate : '無前日資料';

  // stock count
  document.getElementById('instock-count').textContent = (inStock.length || '0') + ' / ' + products.length;

  // total stock & delta (增→綠 減→紅，invert=true)
  document.getElementById('total-stock').textContent = totalStock > 0 ? totalStock.toLocaleString() : '—';
  const stockDeltaEl = document.getElementById('stock-delta-sub');
  if (prevDate && prevStock > 0) {
    const sDelta = (totalStock - prevStock) / prevStock * 100;
    const sCls = sDelta === 0 ? 'delta-flat' : sDelta > 0 ? 'delta-down' : 'delta-up'; // 庫存增=綠
    const sSign = sDelta > 0 ? '+' : '';
    stockDeltaEl.innerHTML = `PCS &nbsp;<span class="${sCls}">${sSign}${sDelta.toFixed(2)}%</span>`;
  } else {
    stockDeltaEl.textContent = 'PCS';
  }

  // cheapest
  const cheapest = [...inStock].sort((a,b) => getPriceUsd(a) - getPriceUsd(b))[0];
  document.getElementById('cheapest-model').textContent = cheapest ? cheapest.model : '—';
  const minQty = cheapest ? (cheapest.min_qty || (cheapest.prices ? Math.min(...Object.keys(cheapest.prices).map(Number)) : '?')) : '?';
  const cheapSrc = cheapest ? (' · ' + (cheapest.source || 'LCSC')) : '';
  document.getElementById('cheapest-sub').textContent = cheapest
    ? '$' + getPriceUsd(cheapest).toFixed(4) + ' (' + minQty + '+起) · ' + normBrand(cheapest.brand) + cheapSrc : '—';
}

function renderTrendChart() {
  const data = specData();
  const dates = Object.keys(data).sort();
  const ph = document.getElementById('trend-placeholder');
  const ct = document.getElementById('trend-container');
  if (!ph || !ct) return;
  if (dates.length < 2) { ph.style.display=''; ct.style.display='none'; return; }
  ph.style.display='none'; ct.style.display='';
  const avgPrices    = dates.map(d => getAvgUsd(data[d]));
  const medianPrices = dates.map(d => getMedianUsd(data[d]));
  if (trendChartInst) trendChartInst.destroy();
  const ctx = document.getElementById('trend-chart');
  if (!ctx) return;
  trendChartInst = new Chart(ctx.getContext('2d'), {
    type:'line',
    data:{labels:dates, datasets:[
      {label:'平均 (USD)', data:avgPrices,
       borderColor:'#3b82f6', backgroundColor:'#3b82f620', tension:0.3,
       pointRadius:5, pointHoverRadius:7, fill:true, spanGaps:true},
      {label:'中位數 (USD)', data:medianPrices,
       borderColor:'#f59e0b', backgroundColor:'transparent', tension:0.3,
       pointRadius:4, pointHoverRadius:6, fill:false, spanGaps:true, borderDash:[5,3]}
    ]},
    options:{responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true, position:'top', labels:{font:{size:11}, boxWidth:16}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y!=null?'$'+c.parsed.y.toFixed(4):'—')}}

      scales:{x:{ticks:{font:{size:10}}, grid:{color:'#f1f5f9'}},

}

function renderStockChart() {
  const data = specData();
  const dates = Object.keys(data).sort();
  const ph = document.getElementById('stock-placeholder');
  const ct = document.getElementById('stock-container');
  if (!ph || !ct) return;
  if (dates.length < 2) { ph.style.display=''; ct.style.display='none'; return; }
  ph.style.display='none'; ct.style.display='';

  const getTotalStock = d => {
    if (d.total_stock != null) return d.total_stock;
    return (d.products || []).reduce((s,p) => s + (p.stock||0), 0);
  };
  const getInStockCount = d => {
    if (d.in_stock_count != null) return d.in_stock_count;
    return (d.products || []).filter(p => (p.stock||0) > 0).length;
  };

  const totalStocks = dates.map(d => getTotalStock(data[d]));
  const inStockCounts = dates.map(d => getInStockCount(data[d]));

  if (stockChartInst) stockChartInst.destroy();
  const ctx = document.getElementById('stock-chart');
  if (!ctx) return;
  stockChartInst = new Chart(ctx.getContext('2d'), {
    type:'line',
    data:{labels:dates, datasets:[
      {label:'現貨庫存總量',data:totalStocks,
       borderColor:'#10b981',backgroundColor:'#10b98120',tension:0.3,pointRadius:5,pointHoverRadius:7,fill:true,spanGaps:true,yAxisID:'y'},
      {label:'有庫存型號數',data:inStockCounts,
       borderColor:'#f59e0b',backgroundColor:'transparent',tension:0.3,pointRadius:4,pointHoverRadius:6,fill:false,spanGaps:true,yAxisID:'y1',borderDash:[4,3]}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:16}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y.toLocaleString():'—')}}
      },
      scales:{
        x:{ticks:{font:{size:10}},grid:{color:'#f1f5f9'}},
        y:{ticks:{font:{size:11},callback:v=>v>=10000?(v/10000).toFixed(1)+'萬':v.toLocaleString()},grid:{color:'#f1f5f9'},position:'left'},
        y1:{ticks:{font:{size:11}},grid:{display:false},position:'right'}

}

// source badge
const srcBadge = (src) => {
  if (src === 'Mouser') return '<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#fef3c7;color:#b45309">Mouser</span>';
  return '<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#dcfce7;color:#15803d">LCSC</span>';
};

function renderTable() {
  const pkgF = (document.getElementById('pkg-filter')||{}).value||'';
  const stkF = (document.getElementById('stock-filter')||{}).value||'';
  const srcF   = (document.getElementById('src-filter')||{}).value||'';
  const brandF = (document.getElementById('brand-filter')||{}).value||'';
  let products = latestProducts();
  if (pkgF)   products = products.filter(p => p.package === pkgF);
  if (stkF === 'instock') products = products.filter(p => p.stock > 0);
  if (srcF)   products = products.filter(p => (p.source||'LCSC') === srcF);
  if (brandF) products = products.filter(p => normBrand(p.brand) === brandF);
  if (priceSort === 'asc')  products = products.sort((a,b) => getPriceUsd(a) - getPriceUsd(b));
  else if (priceSort === 'desc') products = products.sort((a,b) => getPriceUsd(b) - getPriceUsd(a));
  else products = products.sort((a,b) => (b.stock - a.stock) || (getPriceUsd(a) - getPriceUsd(b)));
  const wrap = document.getElementById('table-wrap');
  if (!wrap) return;
  if (!products.length) { wrap.innerHTML='<div class="empty-state">無資料</div>'; return; }

  // 翻頁
  tableTotalPages = Math.ceil(products.length / TABLE_PAGE_SIZE);
  if (tablePage >= tableTotalPages) tablePage = tableTotalPages - 1;
  if (tablePage < 0) tablePage = 0;
  const pageProducts = products.slice(tablePage * TABLE_PAGE_SIZE, (tablePage + 1) * TABLE_PAGE_SIZE);

  const rows = pageProducts.map(p => {
    const sc = p.stock>5000?'stock-hi':p.stock>1000?'stock-mid':p.stock>0?'stock-lo':'stock-zero';
    const sl = p.stock>0 ? p.stock.toLocaleString() : '需訂貨';
    const mq = p.min_qty || (p.prices ? Math.min(...Object.keys(p.prices).map(Number)) : '-');
    const src = p.source || 'LCSC';
    const url = src === 'Mouser' ? (p.mouser_url||'#') : 'https://item.szlcsc.com/'+(p.lcsc_id||'')+'.html';
    const usd = getPriceUsd(p);
    const t50  = getTierUsd(p, 50);
    const t500 = getTierUsd(p, 500);
    return '<tr>'
      +'<td>'+srcBadge(src)+'<br><a href="'+url+'" target="_blank" style="font-family:monospace;font-size:11px;font-weight:600;color:#2563eb;text-decoration:none">'+p.model+'</a></td>'
      +'<td><span class="brand-tag">'+normBrand(p.brand)+'</span></td>'
      +'<td style="text-align:center">'+(p.package||'-')+'</td>'
      +'<td><span class="price-main">$'+usd.toFixed(4)+'</span><br><span class="price-bulk">'+mq+'+起</span></td>'
      +'<td class="price-bulk">'+(t50!=null?'$'+t50.toFixed(4):'-')+'</td>'
      +'<td class="price-bulk">'+(t500!=null?'$'+t500.toFixed(4):'-')+'</td>'
      +'<td style="text-align:center"><span class="stock-badge '+sc+'">'+sl+'</span></td></tr>';
  }).join('');

  const arrow = priceSort === 'asc' ? ' ↑' : priceSort === 'desc' ? ' ↓' : ' ↕';
  const pagination = tableTotalPages > 1
    ? '<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 0;font-size:12px;color:#64748b">'
      +'<button onclick="tablePage=Math.max(0,tablePage-1);renderTable()" style="padding:3px 10px;border:1px solid #e2e8f0;border-radius:4px;background:#fff;cursor:pointer;font-size:12px" '+(tablePage===0?'disabled':'')+'>&lt;</button>'
      +'<span>'+(tablePage+1)+' / '+tableTotalPages+'　共 '+products.length+' 筆</span>'
      +'<button onclick="tablePage=Math.min(tableTotalPages-1,tablePage+1);renderTable()" style="padding:3px 10px;border:1px solid #e2e8f0;border-radius:4px;background:#fff;cursor:pointer;font-size:12px" '+(tablePage===tableTotalPages-1?'disabled':'')+'>&gt;</button>'
      +'</div>'
    : '';

  wrap.innerHTML='<table><thead><tr><th>型號</th><th>品牌</th><th style="text-align:center">封裝</th>'
    +'<th id="price-sort-th" style="cursor:pointer;user-select:none" title="點擊排序">最低單價(USD)'+arrow+'</th>'
    +'<th>50+</th><th>500+</th><th>庫存</th></tr></thead><tbody>'+rows+'</tbody></table>'
    + pagination;
  var th = document.getElementById('price-sort-th');
  if (th) th.addEventListener('click', function(){
    priceSort = priceSort === 'asc' ? 'desc' : priceSort === 'desc' ? null : 'asc';
    tablePage = 0;
    renderTable();
  });
}

document.addEventListener('DOMContentLoaded', function() {
  var helpBtn   = document.getElementById('help-btn');
  var helpModal = document.getElementById('help-modal');
  var closeBtn  = document.getElementById('modal-close-btn');

  var tabsEl = document.getElementById('spec-tabs');
  if (tabsEl) tabsEl.addEventListener('click', function(e){
    var tab = e.target.closest('[data-key]');
    if (tab) { currentSpec = tab.dataset.key; tablePage = 0; buildTabs(); renderAll(); }
  });

  var pkgF   = document.getElementById('pkg-filter');
  var stkF   = document.getElementById('stock-filter');
  var srcF   = document.getElementById('src-filter');
  var brandF = document.getElementById('brand-filter');
  function resetAndRender() { tablePage = 0; renderTable(); }
  if (pkgF)   pkgF.addEventListener('change', resetAndRender);
  if (stkF)   stkF.addEventListener('change', resetAndRender);
  if (srcF)   srcF.addEventListener('change', resetAndRender);
  if (brandF) brandF.addEventListener('change', resetAndRender);

  buildTabs();
  var latest = latestDate();
  var statusEl = document.getElementById('status-text');
  if (latest) {
    if (statusEl) statusEl.textContent = '資料日期：' + latest + ' · ' + specDef().label + ' 共 ' + latestProducts().length + ' 個型號';
    renderAll();
  } else {
    if (statusEl) statusEl.textContent = '尚無資料';
    renderUseInfo();
  }
});
</script>
</body>
</html>
