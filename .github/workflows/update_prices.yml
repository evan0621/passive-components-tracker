name: Daily Price Update (Primary — 06:00 Taiwan)

on:
  schedule:
    - cron: '0 22 * * *'  # 06:00 Taiwan time (UTC+8) = 22:00 UTC previous day
  workflow_dispatch:       # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: passive_components.db
          key: passive-db-${{ github.run_id }}
          restore-keys: passive-db-

      - name: Bootstrap DB from GitHub JSON
        run: python bootstrap_db.py

      - name: Create config
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
        run: |
          python3 -c "
          import json, os
          cfg = {'token': os.environ['GH_PAT'], 'mouser_key': os.environ['MOUSER_API_KEY']}
          open('github_config.json','w').write(json.dumps(cfg))
          print('Config created')
          "

      - name: Run update
        run: python update_prices.py
