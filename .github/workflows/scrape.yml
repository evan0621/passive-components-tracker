name: Scrape LCSC Prices

on:
  schedule:
    - cron: '0 19 * * *'   # 03:00 台灣時間 (UTC+8)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add passive_components_prices.json index.html
          git diff --staged --quiet && echo "no changes" || (
            git commit -m "auto: update prices $(TZ=Asia/Taipei date +%Y-%m-%d)"
            git push
          )
